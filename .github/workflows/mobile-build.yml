name: Mobile Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      EAS_SKIP_AUTO_FINGERPRINT: 1  # fingerprint 계산 스킵
      NODE_ENV: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: apps/mobile/node_modules
          key: node-modules-${{ hashFiles('apps/mobile/package-lock.json') }}
          restore-keys: |
            node-modules-

      - name: Install dependencies
        run: npm install
        working-directory: apps/mobile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android APK
        id: eas_build
        working-directory: apps/mobile
        run: |
          set -e
          echo "🚀 Starting EAS APK build..."
          RESULT=$(npx eas build --platform android --profile production --non-interactive --json --wait)
          echo "$RESULT"
          BUILD_URL=$(echo "$RESULT" | jq -r '.[0].artifacts.buildUrl')
          BUILD_STATUS=$(echo "$RESULT" | jq -r '.[0].status')
          echo "BUILD_URL=$BUILD_URL" >> $GITHUB_ENV
          echo "BUILD_STATUS=$BUILD_STATUS" >> $GITHUB_ENV
          echo "BUILD_URL=$BUILD_URL"
          echo "BUILD_STATUS=$BUILD_STATUS"

      - name: Show build link
        run: |
          echo "✅ EAS Build Dashboard: ${{ env.BUILD_URL }}"

      - name: Send Discord Notification
        if: always()
        run: |
          if [ "${BUILD_STATUS}" = "finished" ]; then
            STATUS_EMOJI="✅ 성공"
          else
            STATUS_EMOJI="❌ 실패"
          fi

          echo "{\"content\": \"Android APK 빌드 ${STATUS_EMOJI}!\n${{ env.BUILD_URL }}\"}" > discord_payload.json
          curl -H "Content-Type: application/json" -d @discord_payload.json "$DISCORD_WEBHOOK"
