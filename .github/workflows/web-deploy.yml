name: Web Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web

      - name: Deploy to Vercel (Preview)
        id: deploy-web
        run: |
          set -e
          # --prod 제거 → Preview 배포
          DEPLOY_OUTPUT=$(npx vercel --token $VERCEL_TOKEN --confirm --cwd apps/web)
          echo "$DEPLOY_OUTPUT"
          # 마지막 줄에 있는 URL 가져오기
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | tail -n 1)
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV

      - name: Send Discord Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == 'success' ]; then
            STATUS_EMOJI="✅ 성공"
          else
            STATUS_EMOJI="❌ 실패"
          fi
          # Discord 메시지 JSON 생성
          echo "{\"content\": \"웹 배포 ${STATUS_EMOJI}!\nPreview URL: $DEPLOY_URL\"}" > discord_payload.json
          curl -H "Content-Type: application/json" -d @discord_payload.json "$DISCORD_WEBHOOK"
