name: Web Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18  # Node 18로 변경

      - name: Install dependencies
        run: npm install
        working-directory: apps/web

      - name: Build Expo Web
        run: npx expo export -p web
        working-directory: apps/web

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify Preview
        id: deploy-web
        run: |
          set -e
          # dist 폴더 경로 확인 후 배포
          if [ ! -d "apps/web/dist" ]; then
            echo "❌ dist 폴더가 존재하지 않습니다. 빌드 확인 필요."
            exit 1
          fi
          DEPLOY_OUTPUT=$(netlify deploy \
            --dir=apps/web/dist \
            --auth=$NETLIFY_AUTH_TOKEN \
            --site=$NETLIFY_SITE_ID \
            --message "GitHub Actions Preview Deploy" \
            --json)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | jq -r '.url')
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV

      - name: Send Discord Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == 'success' ]; then
            STATUS_EMOJI="✅ 성공"
          else
            STATUS_EMOJI="❌ 실패"
          fi
          echo "{\"content\": \"웹 배포 ${STATUS_EMOJI}!\nPreview URL: $DEPLOY_URL\"}" > discord_payload.json
          curl -H "Content-Type: application/json" -d @discord_payload.json "$DISCORD_WEBHOOK"
