name: Web Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web

      - name: Deploy to Vercel
        id: vercel
        run: |
          set -e
          echo "🚀 Deploying to Vercel..."
          DEPLOY_RESULT=$(npx vercel --prod --token $VERCEL_TOKEN --confirm --json)
          echo "$DEPLOY_RESULT"
          # JSON에서 URL 추출
          DEPLOY_URL=$(echo "$DEPLOY_RESULT" | jq -r '.url')
          DEPLOY_STATE=$(echo "$DEPLOY_RESULT" | jq -r '.state')
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "DEPLOY_STATE=$DEPLOY_STATE" >> $GITHUB_ENV

      - name: Show deploy link
        run: echo "✅ Vercel Deploy URL: $DEPLOY_URL"

      - name: Send Discord Notification
        if: always()
        run: |
          if [ "$DEPLOY_STATE" = "READY" ]; then
            STATUS_EMOJI="✅ 성공"
          else
            STATUS_EMOJI="❌ 실패"
          fi
          # Discord 메시지용 JSON 파일 생성
          echo "{\"content\": \"웹 배포 ${STATUS_EMOJI}!\n $DEPLOY_URL\"}" > discord_payload.json
          curl -H "Content-Type: application/json" -d @discord_payload.json "$DISCORD_WEBHOOK"
