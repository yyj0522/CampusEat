name: Web Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web

      - name: Deploy to Vercel
        id: vercel
        run: |
          set -e
          echo "🚀 Deploying to Vercel..."
          DEPLOY_RESULT=$(npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --confirm)
          echo "$DEPLOY_RESULT"
          # 성공 여부 체크 (Vercel CLI는 성공 시 exit 0)
          if [ $? -eq 0 ]; then
            DEPLOY_STATUS="success"
          else
            DEPLOY_STATUS="failure"
          fi
          echo "DEPLOY_STATUS=$DEPLOY_STATUS" >> $GITHUB_ENV

      - name: Send Discord Notification
        if: always()
        run: |
          if [ "$DEPLOY_STATUS" = "success" ]; then
            STATUS_EMOJI="✅ 성공"
          else
            STATUS_EMOJI="❌ 실패"
          fi
          # Discord용 JSON 임시 파일 생성
          echo "{\"content\": \"Web 빌드 ${STATUS_EMOJI}!\"}" > discord_payload.json
          # curl로 전송
          curl -H "Content-Type: application/json" -d @discord_payload.json "$DISCORD_WEBHOOK"
