name: Web Deploy (Netlify Preview)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies from root
        run: npm ci

      - name: Build Web
        run: |
          cd apps/web
          npm install  # 웹 전용 의존성 설치 (lockfile 없어도 가능)
          npm run build
        id: build-web

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Ensure jq is installed
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy to Netlify Production
        if: success()
        id: deploy-web
        run: |
          cd apps/web
          DEPLOY_OUTPUT=$(netlify deploy \
            --prod \
            --auth=$NETLIFY_AUTH_TOKEN \
            --site=$NETLIFY_SITE_ID \
            --message "GitHub Actions Production Deploy" \
            --json)
          echo "$DEPLOY_OUTPUT"

          # URL 추출 (없으면 빈값)
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | jq -r '.deploy.ssl_url // empty')
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV

      - name: Send Discord Notification
        if: success() && env.DEPLOY_URL != ''
        run: |
          STATUS_EMOJI="✅ 성공"
          MESSAGE="웹 빌드 성공!\nPreview URL: $DEPLOY_URL"

          echo "{\"content\": \"$MESSAGE\"}" > discord_payload.json
          curl -H "Content-Type: application/json" -d @discord_payload.json "$DISCORD_WEBHOOK"
