name: Web Deploy (Netlify Production)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      # 1. 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Node.js 설정
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3. 의존성 설치
      - name: Install dependencies
        run: |
          cd apps/web
          npm install

      # 4. Next.js 캐시 삭제
      - name: Clear Next.js cache
        run: |
          cd apps/web
          rm -rf .next

      # 5. Next.js 빌드
      - name: Build Next.js
        run: |
          cd apps/web
          npm run build

      # 6. Netlify CLI 설치
      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      # 7. Netlify 배포
      - name: Deploy to Netlify
        id: deploy-web
        run: |
          cd apps/web
          DEPLOY_OUTPUT=$(netlify deploy \
            --prod \
            --auth=$NETLIFY_AUTH_TOKEN \
            --site=$NETLIFY_SITE_ID \
            --message "GitHub Actions Production Deploy" \
            --json || true)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | jq -r '.url')
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV

      # 8. Discord 알림
      - name: Send Discord Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == 'success' ]; then
            STATUS_EMOJI="✅ 성공"
          else
            STATUS_EMOJI="❌ 실패"
          fi
          echo "{\"content\": \"웹 빌드 ${STATUS_EMOJI}!\nPreview URL: $DEPLOY_URL\"}" > discord_payload.json
          curl -H "Content-Type: application/json" -d @discord_payload.json "$DISCORD_WEBHOOK"
