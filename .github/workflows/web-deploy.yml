name: Web Deploy (Netlify Preview)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies & Build
        run: |
          cd apps/web
          npm ci
          npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Ensure jq is installed
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy to Netlify Production
        id: deploy-web
        run: |
          cd apps/web
          DEPLOY_OUTPUT=$(netlify deploy \
            --prod \
            --auth=$NETLIFY_AUTH_TOKEN \
            --site=$NETLIFY_SITE_ID \
            --message "GitHub Actions Production Deploy" \
            --json)
          echo "$DEPLOY_OUTPUT"

          # 배포 URL 추출
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | jq -r '.deploy.ssl_url')
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV

      - name: Send Discord Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == 'success' ]; then
            STATUS_EMOJI="✅ 성공"
          else
            STATUS_EMOJI="❌ 실패"
          fi
          echo "{\"content\": \"웹 빌드 ${STATUS_EMOJI}!\nPreview URL: $DEPLOY_URL\"}" > discord_payload.json
          curl -H "Content-Type: application/json" -d @discord_payload.json "$DISCORD_WEBHOOK"
